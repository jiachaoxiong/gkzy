apiVersion: batch/v1
kind: Job
metadata:
  name: gkzy-db-init
  namespace: ns-gk5k0f3z
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      containers:
        - name: db-init
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              apk add --no-cache mysql-client curl
              echo "=== 下载并执行 schema.sql ==="
              curl -sS https://raw.githubusercontent.com/jiachaoxiong/gkzy/master/gkzy-server/src/main/resources/db/schema.sql | mysql -h gkzy-mysql -u root -p2qq52b8g gkzy
              echo "=== 下载并执行 data.sql ==="
              curl -sS https://raw.githubusercontent.com/jiachaoxiong/gkzy/master/gkzy-server/src/main/resources/db/data.sql | mysql -h gkzy-mysql -u root -p2qq52b8g gkzy
              echo "=== 数据库初始化完成 ==="
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      restartPolicy: Never
