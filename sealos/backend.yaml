apiVersion: apps/v1
kind: Deployment
metadata:
  name: gkzy-backend
  namespace: ns-gk5k0f3z
  labels:
    app: gkzy-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gkzy-backend
  template:
    metadata:
      labels:
        app: gkzy-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/jiachaoxiong/gkzy-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: gkzy-secret
            - configMapRef:
                name: gkzy-config
          env:
            - name: APP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: gkzy-config
                  key: ALLOWED_ORIGINS
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: gkzy-backend
  namespace: ns-gk5k0f3z
  labels:
    app: gkzy-backend
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: gkzy-backend
