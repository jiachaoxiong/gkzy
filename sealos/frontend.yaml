apiVersion: apps/v1
kind: Deployment
metadata:
  name: gkzy-web
  namespace: ns-gk5k0f3z
  labels:
    app: gkzy-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gkzy-web
  template:
    metadata:
      labels:
        app: gkzy-web
    spec:
      containers:
        - name: frontend
          image: ghcr.io/jiachaoxiong/gkzy-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: gkzy-web
  namespace: ns-gk5k0f3z
  labels:
    app: gkzy-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: gkzy-web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gkzy-web
  namespace: ns-gk5k0f3z
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: gkzy.sealos.run
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gkzy-web
                port:
                  number: 80
